name: 🚀 發布 Python 套件至 PyPI

on:
  release:
    types: [published]

# 🎯 關鍵修正：確保全域擁有讀取內容與寫入身份憑證的權限
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bmiibo
    
    steps:
    - uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 安裝打包工具
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: 構建套件 (Build)
      run: python -m build
      working-directory: python

    - name: 發布至 PyPI (Publish)
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: python/dist/
