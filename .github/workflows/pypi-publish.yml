name: 🚀 發布 Python 套件至 PyPI

on:
  release:
    types: [published] # 當你在 GitHub 建立並發布一個新的 Release 時觸發

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bmiibo
    permissions:
      id-token: write # 🎯 關鍵：這是 Trusted Publishers 用來進行安全驗證的權限

    steps:
    - uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 安裝打包工具
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: 構建套件 (Build)
      run: |
        # 🎯 進入你的 python 資料夾再進行打包
        cd python
        python -m build

    - name: 發布至 PyPI (Publish)
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: python/dist/ # 指定剛才打包好的檔案路徑
